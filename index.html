<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error 404 - Dino Game</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f7f7f7;
    color: #333;
    text-align: center;
  }
  h1 {
    font-size: 70px;
    margin: 20px 0 0;
  }
  p {
    font-size: 18px;
  }
  .game {
    width: 90%;
    max-width: 700px;
    height: 220px;
    border-bottom: 4px solid #333;
    margin: 30px auto;
    position: relative;
    overflow: hidden;
    background: white;
  }
  #dino {
    width: 45px;
    height: 45px;
    background: #333;
    position: absolute;
    bottom: 0;
    left: 50px;
    border-radius: 8px;
  }
  #cactus {
    width: 25px;
    height: 50px;
    background: #2f855a;
    position: absolute;
    bottom: 0;
    right: -40px;
    border-radius: 6px;
    animation: cactusMove 1.8s linear infinite;
  }
  @keyframes cactusMove {
    from { right: -40px; }
    to { right: 100%; }
  }
  .jump {
    animation: jump 0.55s linear;
  }
  @keyframes jump {
    0% { bottom: 0; }
    45% { bottom: 95px; }
    60% { bottom: 95px; }
    100% { bottom: 0; }
  }
  .btn {
    display: inline-block;
    padding: 14px 24px;
    background: #333;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
  }
  #score {
    font-weight: bold;
    margin-top: 10px;
  }
</style>
</head>
<body>
<h1>404</h1>
<p>Página no encontrada. Mientras tanto, juega un poco.</p>
<div class="game" onclick="jump()">
  <div id="dino"></div>
  <div id="cactus"></div>
</div>
<div id="score">Puntos: 0</div>
<p>Toca la pantalla, presiona espacio o flecha arriba para saltar.</p>
<a class="btn" href="index.html">Volver al inicio</a>
<script>
  const dino = document.getElementById("dino");
  const cactus = document.getElementById("cactus");
  const scoreText = document.getElementById("score");
  let score = 0;
  let gameOver = false;
  function jump() {
    if (!dino.classList.contains("jump") && !gameOver) {
      dino.classList.add("jump");
      setTimeout(() => {
        dino.classList.remove("jump");
      }, 550);
    }
    if (gameOver) {
      location.reload();
    }
  }
  document.addEventListener("keydown", function(event) {
    if (event.code === "Space" || event.code === "ArrowUp") {
      jump();
    }
  });
  document.addEventListener("touchstart", jump);
  setInterval(() => {
    if (!gameOver) {
      score++;
      scoreText.textContent = "Puntos: " + score;
    }
  }, 200);
  setInterval(() => {
    const dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));
    const cactusLeft = cactus.getBoundingClientRect().left;
    const dinoRight = dino.getBoundingClientRect().right;
    const dinoLeft = dino.getBoundingClientRect().left;
    if (
      cactusLeft < dinoRight &&
      cactusLeft > dinoLeft &&
      dinoBottom < 45
    ) {
      gameOver = true;
      cactus.style.animation = "none";
      scoreText.textContent = "Juego terminado. Puntos: " + score + " | Toca para reiniciar";
    }
  }, 10);
</script>
</body>
</html>
